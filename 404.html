<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 Not Found — ASML-ERP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    body {
      background: #0D1321;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .error-wrap {
      text-align: center;
      padding: 40px 24px;
      max-width: 520px;
    }

    .error-code {
      font-family: var(--font-display);
      font-size: 120px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), #FF6B35);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-12px)
      }
    }

    .error-code {
      animation: float 3s ease-in-out infinite;
    }
  </style>
</head>

<body>
  <div class="error-wrap">
    <div class="error-code">404</div>
    <h1 style="font-family:var(--font-display);font-size:24px;font-weight:800;color:#FFFFFF;margin-bottom:12px;">Page
      Not Found</h1>
    <p style="color:rgba(255,255,255,0.5);font-size:14px;line-height:1.7;margin-bottom:32px;">
      The page you're looking for doesn't exist or has been moved.<br>Let's get you back on track.
    </p>
    <div class="d-flex gap-3 justify-content-center flex-wrap">
      <a href="index.html" class="btn-erp btn-primary"><i class="bi bi-house-fill"></i> Go to Dashboard</a>
      <button class="btn-erp btn-outline" style="color:#fff;border-color:rgba(255,255,255,0.2);"
        onclick="history.back()"><i class="bi bi-arrow-left"></i> Go Back</button>
    </div>
    <div style="margin-top:48px;">
      <div style="font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:16px;">Quick links</div>
      <div class="d-flex gap-2 justify-content-center flex-wrap">
        <a href="sales.html"
          style="color:rgba(255,255,255,0.5);font-size:12px;padding:4px 12px;border:1px solid rgba(255,255,255,0.1);border-radius:20px;">Sales</a>
        <a href="inventory.html"
          style="color:rgba(255,255,255,0.5);font-size:12px;padding:4px 12px;border:1px solid rgba(255,255,255,0.1);border-radius:20px;">Inventory</a>
        <a href="finance.html"
          style="color:rgba(255,255,255,0.5);font-size:12px;padding:4px 12px;border:1px solid rgba(255,255,255,0.1);border-radius:20px;">Finance</a>
        <a href="reports.html"
          style="color:rgba(255,255,255,0.5);font-size:12px;padding:4px 12px;border:1px solid rgba(255,255,255,0.1);border-radius:20px;">Reports</a>
        <a href="settings.html"
          style="color:rgba(255,255,255,0.5);font-size:12px;padding:4px 12px;border:1px solid rgba(255,255,255,0.1);border-radius:20px;">Settings</a>
      </div>
    </div>
    <div style="margin-top:40px;font-size:11px;color:rgba(255,255,255,0.2);">© 2026 ASML-ERP Corp.</div>
  </div>
  <script src="assets/js/app.js"></script>
</body>

</html>
